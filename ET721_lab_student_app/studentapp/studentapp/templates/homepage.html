<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Student Learning App</title>
    <style>
        /* Basic reset */
        body, h1, nav, ul, li, a {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Global Styles */
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }

        /* Navigation Styles */
        nav {
            text-align: center;
            margin-top: 20px;
        }

        nav ul {
            list-style-type: none;
            padding: 0;
        }

        nav ul li {
            display: inline-block;
            margin: 10px 15px;
        }

        nav ul li a {
            text-decoration: none;
            color: #3498db;
            font-size: 18px;
            padding: 10px 20px;
            border-radius: 5px;
            background-color: #ecf0f1;
            transition: background-color 0.3s, color 0.3s;
        }

        nav ul li a:hover {
            background-color: #3498db;
            color: white;
        }

        nav ul li a:active {
            background-color: #2980b9;
        }
    </style>
</head>
<body>
    <h1>Welcome to the Student Learning Management App!</h1>
    <nav>
        <ul>
            <li><a href="/">Homepage</a></li>
            <li><a href="/to-do-list/">To-Do List</a></li>
            <li><a href="/blog/">Blog</a></li>
            <li><a href="/upload-notes/">Upload Notes</a></li>
        </ul>
    </nav>
</body>
</html>
